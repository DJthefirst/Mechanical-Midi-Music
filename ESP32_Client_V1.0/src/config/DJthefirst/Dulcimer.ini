; PlatformIO Project Dulcimer Configuration File

[Dulcimer]
#---------- Device Configuration ----------
device_cfg = 
    -D CFG_DEVICE_NAME="\"Teensy Dulcimer\""
    -D CFG_DEVICE_ID=0x00018

#---------- Instrument Configuration ----------
instrument_cfg =
	-D CFG_INSTRUMENT_DULCIMER
    -D CFG_INSTRUMENT_TYPE_VALUE="\"Instruments/DJthefirst/Dulcimer.h\""
    -D CFG_NUM_INSTRUMENTS=1 #Max Number of Instrument groups is 32
    -D CFG_NUM_SUBINSTRUMENTS=1 #Multiplies Instrument groups into individual instruments
    -D CFG_MIN_NOTE=0 #Absolute Lowest Note Min=0
    -D CFG_MAX_NOTE=127 #Absolute Highest Note Max=127
	-D CFG_NOTE_TIMEOUT_MS=20 #Maximun duration of a sustained note incase of stuck notes (0 to disable) 
	-D CFG_VIBRATO_ENABLED

#---------- Network Configuration ----------
network_serial =
	-D CFG_MMM_NETWORK_SERIAL
    -D CFG_MMM_NETWORK_SERIAL_BAUD=115200 # Standard MIDI baud rate

network_udp =
	-D CFG_MMM_NETWORK_UDP
	-D CFG_MMM_NETWORK_UDP_AsyncWebServer_PORT=80 # Default AsyncWebServer port
	-D CFG_MMM_NETWORK_UDP_ADDRESS="{224, 5, 6, 7}" # Default local network IP
	-D CFG_MMM_NETWORK_UDP_OTA_PORT=8337 # Default UDP port for MIDI

network_usb =
	-D CFG_MMM_NETWORK_USB

network_din =
	-D CFG_MMM_NETWORK_DIN

#---------- Components Configuration ----------
component_shiftregister =
	-D CFG_COMPONENT_SHIFTREGISTER
	-D CFG_SHIFTREGISTER_TYPE=DEFAULT
	; -D CFG_SHIFTREGISTER_TYPE=HW_ACCEL
	; -D CFG_SHIFTREGISTER_TYPE=FLEXIO
	-D CFG_SHIFTREGISTER_DATA_HOLDTIME_NS=25

#---------- Extras Configuration ----------
extra_local_storage =
	-D CFG_EXTRA_LOCAL_STORAGE

extra_addr_leds =
	-D CFG_EXTRA_ADDRESSABLE_LEDS
	-D CFG_NUM_LEDS=8
	-D CFG_BRIGHTNESS=255
	-D CFG_LED_TYPE=WS2811
	-D CFG_COLOR_ORDER=GRB
	-D CFG_UPDATES_PER_SECOND=100

#---------- PlatformIO Configuration ----------
framework = arduino
build_unflags = -std=gnu++11
build_flags = 
	-std=gnu++17
	${Dulcimer.device_cfg}
	${Dulcimer.instrument_cfg}

	# Network Configurations
	${Dulcimer.network_serial}
	; ${Dulcimer.network_udp}
	; ${Dulcimer.network_usb}
	; ${Dulcimer.network_din}

	# Components Configurations
	${Dulcimer.component_shiftregister}

	# Extras Configurations
	${Dulcimer.extra_local_storage}
	; ${Dulcimer.extra_addr_leds}

monitor_speed = 115200

lib_deps = 
	fastled/FastLED@^3.5.0
	; 4-20ma/ModbusMaster@^2.0.1
	; robtillaart/AD9833@^0.4.0
  	;lathoub/AppleMIDI@^3.3.0
	;lathoub/BLE-MIDI@^2.2

check_flags = --enable=all --suppress=unusedFunction

########## ESP32 Dev CONFIGURATION ##########
[Dulcimer_esp32dev]
extends = Dulcimer

#---------- Hardware Configuration ----------
build_flags = 
	${Dulcimer.build_flags}
	-D CFG_TIMER_RESOLUTION_US=8
	-D CFG_PINS_INSTRUMENT_ShiftRegister1="2,4,18,19,21"
	-D CFG_PINS_INSTRUMENT_ShiftRegister2="22,23,32,33,25"
    -D CFG_PIN_LED_DATA=33

########## TEENSY 4.1 CONFIGURATION ##########
[Dulcimer_teensy41]
extends = Dulcimer

#---------- Hardware Configuration ----------
build_flags = 
	${Dulcimer.build_flags}
	-D CFG_TIMER_RESOLUTION_US=1
	-D CFG_PINS_INSTRUMENT_ShiftRegister1="1,4,3,2,5"
	-D CFG_PINS_INSTRUMENT_ShiftRegister2="8,11,10,9,12"
    -D CFG_PIN_LED_DATA=29