; PlatformIO Project StepperSynth Configuration File

[StepperSynth]
#---------- Device Configuration ----------
device_cfg =
    -D CFG_DEVICE_NAME="\"StepperSynth\""
    -D CFG_DEVICE_ID=0x0003

#---------- Instrument Configuration ----------
instrument_cfg =
    -D CFG_INSTRUMENT_STEPPERSYNTHHW
    -D CFG_INSTRUMENT_HWPWM
    -D CFG_INSTRUMENT_TYPE_VALUE="\"Instruments/DJthefirst/StepperSynth.h\""
    -D CFG_NUM_INSTRUMENTS=10
    -D CFG_NUM_SUBINSTRUMENTS=1
    -D CFG_MIN_NOTE=0
    -D CFG_MAX_NOTE=127
    -D CFG_NOTE_TIMEOUT_MS=10000

#---------- Network Configuration ----------
network_serial =
    -D CFG_MMM_NETWORK_SERIAL
    -D CFG_MMM_NETWORK_SERIAL_BAUD=115200

network_udp =
    -D CFG_MMM_NETWORK_UDP
    -D CFG_MMM_NETWORK_UDP_AsyncWebServer_PORT=80
    -D CFG_MMM_NETWORK_UDP_ADDRESS="{224, 5, 6, 7}"
    -D CFG_MMM_NETWORK_UDP_OTA_PORT=8337

network_usb =
    -D CFG_MMM_NETWORK_USB

network_din =
    -D CFG_MMM_NETWORK_DIN

#---------- Components Configuration ----------
component_pwm =
    -D CFG_COMPONENT_PWM
    -D CFG_PWM_TYPE=DEFAULT
	; -D CFG_PWM_TYPE=HW_ACCEL
	; -D CFG_PWM_TYPE=FLEXIO
    ; Hardware pin map is defined per-board in each HW section

component_shiftregister =
    -D CFG_COMPONENT_SHIFTREGISTER
    -D CFG_SHIFTREGISTER_TYPE=DEFAULT
	; -D CFG_SHIFTREGISTER_TYPE=HW_ACCEL
	; -D CFG_SHIFTREGISTER_TYPE=FLEXIO
    -D CFG_SHIFTREGISTER_DATA_HOLDTIME_NS=25
    -D CFG_SHIFTREGISTER_NUM_OUTPUTS=16
    ; Hardware pin map is defined per-board in each HW section

#---------- Extras Configuration ----------
extra_local_storage =
	-D CFG_EXTRA_LOCAL_STORAGE

extra_addr_leds =
    -D CFG_EXTRA_ADDRESSABLE_LEDS
    -D CFG_NUM_LEDS=50
    -D CFG_BRIGHTNESS=255
    -D CFG_LED_TYPE=WS2811
    -D CFG_COLOR_ORDER=GRB
    -D CFG_UPDATES_PER_SECOND=100



#---------- PlatformIO Configuration ----------
framework = arduino
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    ${StepperSynth.device_cfg}
    ${StepperSynth.instrument_cfg}

    ${StepperSynth.network_serial}
    ; ${StepperSynth.network_udp}
    ; ${StepperSynth.network_usb}
    ; ${StepperSynth.network_din}

    ${StepperSynth.component_pwm}
    ${StepperSynth.component_shiftregister}
    ${StepperSynth.extra_local_storage}
    ${StepperSynth.extra_addr_leds}

monitor_speed = 115200

lib_deps =
    fastled/FastLED@^3.5.0

########## ESP32 Dev CONFIGURATION ##########
[StepperSynthHw_esp32dev]
extends = StepperSynth

#---------- Hardware Configuration ----------
build_flags =
    ${StepperSynth.build_flags}
    -D CFG_TIMER_RESOLUTION_US=8
    -D CFG_PINS_INSTRUMENT_PWM="33,32,19,21,22,23,2,4" #16, 13
    -D CFG_PINS_INSTRUMENT_ShiftRegister="25,27,26"
    -D CFG_PIN_LED_DATA=18

########## TEENSY 4.1 CONFIGURATION ##########
[StepperSynthHw_teensy41]
extends = StepperSynth

#---------- Hardware Configuration ----------
build_flags =
    ${StepperSynth.build_flags}
    -D CFG_TIMER_RESOLUTION_US=1
    -D CFG_PINS_INSTRUMENT_PWM="23, 22, 28, 6, 7, 24, 3, 4, 5, 36"
    -D CFG_PINS_INSTRUMENT_ShiftRegister="17,16,15"
    -D CFG_PIN_LED_DATA=13