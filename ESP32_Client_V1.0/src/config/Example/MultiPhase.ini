; PlatformIO Project MultiPhase Configuration File

[MultiPhase]
#---------- Device Configuration ----------
device_cfg = 
    -D CFG_DEVICE_NAME="\"MultiPhase\""
    -D CFG_DEVICE_ID=0x00018

#---------- Instrument Configuration ----------
instrument_cfg =
	-D CFG_INSTRUMENT_MULTIPHASE
    -D CFG_INSTRUMENT_TYPE_VALUE="\"Instruments/Base/MultiPhase/MultiPhase.h\""

    -D CFG_NUM_INSTRUMENTS=2 #Max Number of Instrument groups is 32
    -D CFG_NUM_SUBINSTRUMENTS=1 #Multiplies Instrument groups into individual instruments
    -D CFG_MIN_NOTE=0 #Absolute Lowest Note Min=0
    -D CFG_MAX_NOTE=127 #Absolute Highest Note Max=127
	-D CFG_NOTE_TIMEOUT_MS=10000 #Maximun duration of a sustained note incase of stuck notes (0 to disable) 
	-D CFG_VIBRATO_ENABLED

#---------- Network Configuration ----------
network_serial =
	-D CFG_MMM_NETWORK_SERIAL
    -D CFG_MMM_NETWORK_SERIAL_BAUD=115200 # Standard MIDI baud rate

network_udp =
	-D CFG_MMM_NETWORK_UDP
	-D CFG_MMM_NETWORK_UDP_AsyncWebServer_PORT=80 # Default AsyncWebServer port
	-D CFG_MMM_NETWORK_UDP_ADDRESS="{224, 5, 6, 7}" # Default local network IP
	-D CFG_MMM_NETWORK_UDP_OTA_PORT=8337 # Default UDP port for MIDI

network_usb =
	-D CFG_MMM_NETWORK_USB

network_din =
	-D CFG_MMM_NETWORK_DIN

#---------- Components Configuration ----------
component_pwm = 
	-D CFG_COMPONENT_PWM
    -D CFG_PWM_TYPE=DEFAULT
	; -D CFG_PWM_TYPE=HW_ACCEL
	; -D CFG_PWM_TYPE=FLEXIO
	-D CFG_PWM_NOTES_DOUBLE

component_multiphase =
		-D CFG_COMPONENT_MULTIPHASE
		-D CFG_MULTIPHASE_TYPE=DEFAULT
		; -D CFG_MULTIPHASE_TYPE=HW_ACCEL
		-D CFG_MULTIPHASE_ENABLE_PIN="True"
		-D CFG_MULTIPHASE_WAVE_TABLE_OUTPUTS=3
		-D CFG_MULTIPHASE_WAVE_TABLE_STEPS=3
		-D CFG_MULTIPHASE_WAVE_TABLE="{{1,0,0},{0,1,0},{0,0,1}}"

component_limits =
	-D CFG_COMPONENT_LIMITS
	-D CFG_LIMITS_POS_MIN=0
	-D CFG_LIMITS_POS_MAX=150 # 76 Max for 8in Floppy Drives. 0 for continous.

#---------- Extras Configuration ----------
extra_local_storage =
	-D CFG_EXTRA_LOCAL_STORAGE

extra_addr_leds =
	-D CFG_EXTRA_ADDRESSABLE_LEDS
	-D CFG_NUM_LEDS=8
	-D CFG_BRIGHTNESS=255
	-D CFG_LED_TYPE=WS2811
	-D CFG_COLOR_ORDER=GRB
	-D CFG_UPDATES_PER_SECOND=100

#---------- PlatformIO Configuration ----------
framework = arduino
build_unflags = -std=gnu++11
build_flags = 
	-std=gnu++17
	${MultiPhase.device_cfg}
	${MultiPhase.instrument_cfg}

	# Network Configurations
	${MultiPhase.network_serial}
	; ${MultiPhase.network_udp}
	; ${MultiPhase.network_usb}
	; ${MultiPhase.network_din}

	# Components Configurations
	${MultiPhase.component_pwm}
	${MultiPhase.component_multiphase}
	${MultiPhase.component_limits}

	# Extras Configurations
	${MultiPhase.extra_local_storage}
	; ${MultiPhase.extra_addr_leds}

monitor_speed = 115200

lib_deps = 
	fastled/FastLED@^3.5.0

check_flags = --enable=all --suppress=unusedFunction


[MultiPhase_esp32dev]
extends = MultiPhase

#---------- Hardware Configuration ----------
build_flags = 
	${MultiPhase.build_flags}
	-D CFG_TIMER_RESOLUTION_US=8
	-D CFG_PINS_INSTRUMENT_PWM="2,4,18,19,21,22,23,33" # Enable?, Out1, ... ,Out(WAVE_TABLE_OUTPUTS) X Instruments
    -D CFG_PIN_LED_DATA=27

########## TEENSY 4.1 CONFIGURATION ##########
[MultiPhase_teensy41]
extends = MultiPhase

#---------- Hardware Configuration ----------
build_flags = 
	${MultiPhase.build_flags}
	-D CFG_TIMER_RESOLUTION_US=1
	-D CFG_PINS_INSTRUMENT_PWM="1,2,3,4,5,6,7,8" # Enable?, Out1, ... ,Out(WAVE_TABLE_OUTPUTS) X Instruments
    -D CFG_PIN_LED_DATA=29